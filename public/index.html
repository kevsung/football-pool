<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pick'em — TechBandits Pool</title>
  <script>document.documentElement.setAttribute('data-theme',localStorage.getItem('theme')||'light')</script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inclusive+Sans&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <a href="/" class="site-logo">🏈 <span class="pool-name">TechBandits Pool</span></a>
    <nav class="site-nav" aria-label="Main navigation">
      <a href="/" class="active" aria-current="page">Picks</a>
      <a href="/leaderboard">Standings</a>
      <a href="/admin" id="admin-link" style="display:none">Admin</a>
    </nav>
    <div class="header-actions">
      <span class="user-name" id="user-name"></span>
      <button class="theme-toggle" id="theme-toggle" aria-label="Switch to dark mode" title="Switch to dark mode">☾</button>
      <button class="btn-ghost" id="signout-btn">Sign out</button>
    </div>
  </div>
</header>

<main class="page">
  <div id="loading" class="loading">Loading…</div>
  <div id="no-week" class="empty-state" style="display:none">
    <div style="font-size:2rem">🏈</div>
    <h2>No picksheet yet</h2>
    <p>The admin hasn't published this week's games. Check back soon.</p>
  </div>

  <div id="pick-content" style="display:none">
    <div class="week-header">
      <h1 id="week-title">Week 1 Picks</h1>
      <div class="lock-countdown" id="countdown-wrap">
        Lock: <span class="time" id="countdown">—</span>
      </div>
    </div>

    <div id="submitted-banner" class="submitted-banner" style="display:none">
      ✅ Your picks are locked in! Results will update as games finish.
    </div>

    <div class="alert alert-info" id="lock-alert" style="display:none">
      🔒 Picks are locked for this week.
    </div>

    <div class="pick-counter" id="pick-counter" aria-live="polite">
      <div class="counter-item">
        <span class="counter-label">Picks</span>
        <span class="counter-value incomplete" id="cnt-picks">0 / 15</span>
      </div>
      <div class="counter-item">
        <span class="counter-label">Key Pick</span>
        <span class="counter-value incomplete" id="cnt-key">None</span>
      </div>
      <div class="counter-item">
        <span class="counter-label">Tiebreaker</span>
        <span class="counter-value incomplete" id="cnt-tb">—</span>
      </div>
    </div>

    <div class="tiebreaker-section">
      <label for="tiebreaker-input">
        Tiebreaker: Predict the combined final score of the <strong id="tb-game-label">MNF game</strong>
        <span id="tb-game-teams"></span>
      </label>
      <input type="number" id="tiebreaker-input" min="0" max="200" placeholder="e.g. 47" aria-label="Tiebreaker predicted combined score">
    </div>

    <div class="games-grid" id="games-grid" role="list"></div>

    <div class="submit-row">
      <button class="btn btn-primary btn-submit" id="submit-btn" disabled aria-disabled="true">Submit Picks</button>
    </div>
  </div>
</main>

<script src="/js/common.js"></script>
<script src="/js/picks.js"></script>
</body>
</html>
