<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Standings — TechBandits Pool</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <a href="/" class="site-logo">🏈 TechBandits</a>
    <nav class="site-nav">
      <a href="/">Picks</a>
      <a href="/leaderboard" class="active">Standings</a>
      <span id="admin-link-wrap" style="display:none"><a href="/admin">Admin</a></span>
    </nav>
    <div class="header-user">
      <span class="user-name" id="user-name"></span>
      <button class="btn-link" id="signout-btn">Sign out</button>
    </div>
  </div>
</header>

<main class="page">
  <div class="standings-controls">
    <div class="tabs" style="border:none;margin:0">
      <button class="tab-btn active" id="btn-weekly" data-view="weekly">Weekly</button>
      <button class="tab-btn" id="btn-season" data-view="season">Season</button>
    </div>

    <select class="form-select week-selector" id="week-select" style="display:none">
      <option value="">Loading…</option>
    </select>

    <span class="last-updated" id="last-updated"></span>
  </div>

  <div id="loading" class="loading">Loading…</div>
  <div id="empty" class="empty-state" style="display:none">
    <div style="font-size:2rem">📊</div>
    <h2>No standings yet</h2>
    <p>Check back once games are complete.</p>
  </div>

  <div id="standings-wrap" style="display:none">
    <div class="card">
      <div class="table-wrap">
        <table id="standings-table">
          <thead>
            <tr>
              <th>#</th>
              <th>Name</th>
              <th style="text-align:right">Pts</th>
              <th style="text-align:right">Key W</th>
              <th style="text-align:right" id="tb-col-header">TB Diff</th>
            </tr>
          </thead>
          <tbody id="standings-body"></tbody>
        </table>
      </div>
    </div>
  </div>
</main>

<script src="/js/leaderboard.js"></script>
</body>
</html>
